# This rule is not used by the project tunnel itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the tunnel.achetronic.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: tunnel
    app.kubernetes.io/managed-by: kustomize
  name: edgenode-editor-role
rules:
- apiGroups:
  - tunnel.achetronic.com
  resources:
  - edgenodes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - tunnel.achetronic.com
  resources:
  - edgenodes/status
  verbs:
  - get
