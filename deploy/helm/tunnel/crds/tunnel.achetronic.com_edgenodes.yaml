    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          EdgeNode is the Schema for the edgenodes API. It models one VPS relay and
          its in-cluster uplink. The EdgeNodeReconciler is the single writer over the
          machine and over the uplink workload.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of EdgeNode.
            properties:
              address:
                description: Address is the public IP (or hostname) of the VPS.
                type: string
              edge:
                description: |-
                  Edge configures the VPS-side edge proxy: how it health checks the uplink
                  replicas and fails over between them. Optional; sane defaults apply.
                properties:
                  healthCheck:
                    description: |-
                      HealthCheck tunes the active health checks Envoy runs against each uplink
                      replica's readiness endpoint.
                    properties:
                      healthyThreshold:
                        default: 2
                        description: |-
                          HealthyThreshold is the number of consecutive successful probes required
                          before a replica is put back into rotation.
                        format: int32
                        minimum: 1
                        type: integer
                      interval:
                        default: 5s
                        description: Interval is the time between probes, in Envoy
                          duration format (e.g. "5s").
                        type: string
                      timeout:
                        default: 2s
                        description: |-
                          Timeout is how long each probe may take before it counts as a failure
                          (e.g. "2s").
                        type: string
                      unhealthyThreshold:
                        default: 2
                        description: |-
                          UnhealthyThreshold is the number of consecutive failed probes required
                          before a replica is taken out of rotation.
                        format: int32
                        minimum: 1
                        type: integer
                    type: object
                type: object
              host:
                description: |-
                  Host tunes the VPS as a machine (kernel and NIC), independent of the proxy.
                  Optional; sane defaults apply. Placed between SSH and Edge by convention:
                  host-level OS tuning sits below the proxy configuration.
                properties:
                  disableNicOffloads:
                    default: false
                    description: |-
                      DisableNicOffloads turns GRO/GSO off on the underlay NIC carrying the
                      WireGuard transport. It defaults false (offloads enabled) because disabling
                      them degrades throughput for ordinary TCP/QUIC traffic; enable it only for
                      encapsulated/non-uniform UDP payloads where GRO coalescing can corrupt
                      datagram boundaries.
                    type: boolean
                  kernelMaxSocketBufferBytes:
                    default: 26214400
                    description: |-
                      KernelMaxSocketBufferBytes is the socket-buffer ceiling. It is threaded to
                      both the kernel sysctls (net.core.rmem_max/wmem_max) and the
                      SO_RCVBUF/SO_SNDBUF of Envoy's UDP listeners. UDP does not autotune, so
                      this single knob raises the effective buffer for high-throughput UDP while
                      TCP autotunes up to the same ceiling. Defaults to 26214400 (25MB).
                    format: int64
                    minimum: 0
                    type: integer
                type: object
              ssh:
                description: SSH holds the connection details used to enroll and manage
                  the VPS.
                properties:
                  connectTimeout:
                    default: 30s
                    description: |-
                      ConnectTimeout bounds how long the operator waits to establish the SSH
                      connection to the VPS (e.g. "30s"). It prevents a reconcile worker from
                      blocking indefinitely on an unreachable host.
                    type: string
                  insecureSkipHostKeyVerification:
                    default: false
                    description: |-
                      InsecureSkipHostKeyVerification disables SSH host key verification. When
                      false (the default) the operator requires a "knownHosts" entry in the
                      referenced Secret and refuses to connect to a host whose key does not
                      match, protecting the enrollment channel from man-in-the-middle attacks.
                    type: boolean
                  port:
                    default: 22
                    description: Port is the TCP port where the VPS SSH daemon listens.
                    format: int32
                    type: integer
                  secretRef:
                    description: |-
                      SecretRef points to the Secret holding the SSH credentials. The Secret is
                      expected to carry a "password" or a "privateKey" entry (and optionally a
                      "passphrase" for an encrypted private key). It may also carry a
                      "knownHosts" entry (OpenSSH known_hosts format, e.g. the output of
                      "ssh-keyscan") used to verify the VPS host key. For a non-standard SSH
                      port the entry must use the [host]:port form (ssh-keyscan -p produces it).
                    properties:
                      name:
                        description: Name is the Secret name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace is the Secret namespace. Defaults to
                          the owner's namespace when empty.
                        type: string
                    required:
                    - name
                    type: object
                  user:
                    default: root
                    description: User is the SSH login used to enroll and manage the
                      VPS.
                    type: string
                required:
                - secretRef
                type: object
              tunnel:
                description: Tunnel configures the WireGuard relay transport.
                properties:
                  listenPort:
                    default: 51821
                    description: |-
                      ListenPort is the UDP port where the VPS WireGuard relay listens for the
                      tunnels initiated by the cluster.
                    format: int32
                    type: integer
                  mtu:
                    default: 1420
                    description: |-
                      MTU is the Maximum Transmission Unit for the WireGuard interfaces on both
                      the VPS and the cluster. Defaults to 1420 (standard for internet transport).
                    format: int32
                    type: integer
                  network:
                    default: 10.200.0.0/24
                    description: |-
                      Network is the CIDR of the tunnel overlay. ".1" is the VPS relay and
                      ".2 + ordinal" is each uplink replica.
                    type: string
                  persistentKeepalive:
                    default: 25
                    description: |-
                      PersistentKeepalive specifies the interval in seconds between WireGuard
                      keepalive packets sent by the uplink to keep stateful firewalls/NATs open.
                      Defaults to 25.
                    format: int32
                    type: integer
                type: object
              uplink:
                description: Uplink configures the in-cluster uplink StatefulSet.
                properties:
                  affinity:
                    description: Affinity allows defining advanced scheduling rules
                      for the uplink pods.
                    properties:
                      nodeAffinity:
                        description: Describes node affinity scheduling rules for
