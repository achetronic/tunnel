{{- $metricsOn := ne (.Values.flags.metricsBindAddress | toString) "0" -}}
{{- $metricsPort := .Values.flags.metricsBindAddress | toString | splitList ":" | last -}}
{{- if $metricsOn }}
# Service exposing the controller-runtime metrics endpoint.
# Port name "https" matches the ServiceMonitor port field.
# Ref: https://github.com/achetronic/tunnel/blob/main/config/default/metrics_service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tunnel.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tunnel.labels" . | nindent 4 }}
  {{- with .Values.metrics.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ports:
    - name: https
      port: {{ $metricsPort }}
      protocol: TCP
      targetPort: {{ $metricsPort }}
  selector:
    {{- include "tunnel.selectorLabels" . | nindent 4 }}
{{- end }}
