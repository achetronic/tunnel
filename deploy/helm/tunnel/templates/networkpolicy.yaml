{{- if .Values.metrics.networkPolicy.enabled }}
# NetworkPolicy: allow ingress to the metrics port only from namespaces
# whose labels match metrics.networkPolicy.namespaceSelector.
# Mirrors config/network-policy/allow-metrics-traffic.yaml.
# Ref: https://github.com/achetronic/tunnel/blob/main/config/network-policy/allow-metrics-traffic.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tunnel.fullname" . }}-allow-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tunnel.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tunnel.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.metrics.networkPolicy.namespaceSelector | nindent 14 }}
      ports:
        - port: {{ .Values.flags.metricsBindAddress | toString | splitList ":" | last }}
          protocol: TCP
{{- end }}
